<!DOCTYPE html>
<html lang="tr" style="height: 100%; overflow: hidden;">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Akıllı Cüzdan | Cloud</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        html, body { height: 100%; margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        body { background: linear-gradient(135deg, #1c2137 0%, #764ba2 100%); display: flex; justify-content: center; align-items: center; color: white; }
        .container { background: rgba(255, 255, 255, 0.15); padding: 0.8rem; border-radius: 20px; backdrop-filter: blur(10px); box-shadow: 0 8px 32px rgba(0,0,0,0.3); width: 90%; max-width: 350px; text-align: center; position: relative; max-height: 95vh; display: flex; flex-direction: column; gap: 4px; }
        .profile-btn { position: absolute; top: 10px; right: 10px; background: #fff; color: #764ba2; border-radius: 50%; width: 30px; height: 30px; cursor: pointer; font-weight: 600; line-height: 30px; z-index: 20; }
        #profil-menu { position: absolute; top: 45px; right: 10px; background: white; color: black; padding: 10px; border-radius: 10px; z-index: 30; text-align: left; }
        .nav-container { display: flex; justify-content: center; align-items: center; gap: 10px; margin-top: 25px; }
        .nav-btn { cursor: pointer; padding: 2px 10px; background: rgba(255,255,255,0.2); border-radius: 8px; font-weight: bold; }
        h3 { margin: 2px 0; }
        input, textarea, select { width: 100%; padding: 8px; margin: 2px 0; border: none; border-radius: 10px; font-size: 14px; box-sizing: border-box; font-family: inherit; }
        button { padding: 6px; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; color: white; width: 100%; margin-top: 2px; text-transform: uppercase; }
        .close-btn { background: #666 !important; font-size: 10px; padding: 3px; margin-bottom: 5px; }
        .link-text { font-size: 11px; cursor: pointer; text-decoration: underline; color: #e0e0e0; margin-top: 2px; }
        .liste-alani { flex-grow: 1; overflow-y: auto; margin-top: 5px; border-top: 1px solid rgba(255,255,255,0.2); }
        table { width: 100%; border-collapse: collapse; }
        td { padding: 4px; border-bottom: 1px solid rgba(255,255,255,0.1); text-align: left; }
        .hidden { display: none !important; }
        .footer-apps { margin-top: auto; padding-top: 10px; border-top: 1px solid rgba(255,255,255,0.2); }
        .app-box { display: flex; flex-direction: column; align-items: center; justify-content: center; margin-top: 5px; text-decoration: none; color: white; }
        .app-icon { font-size: 30px; margin-bottom: 2px; }
        .app-label { font-size: 10px; font-weight: bold; background: rgba(255,255,255,0.2); padding: 2px 8px; border-radius: 5px; }
        .coffee-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container" id="auth-screen">
    <h2>AKILLI CÜZDAN</h2>
    <input type="email" id="email" placeholder="E-posta">
    <input type="password" id="sifre" placeholder="Şifre">
    <button id="btn-giris-yap" style="background:#10b981;">Giriş Yap</button>
    <div class="link-text" id="btn-gecis-sifre-sifirla" style="color:#fbbf24;">Şifremi unuttum</div>
    <div class="link-text" id="btn-gecis-kayit">Henüz üye değil misin? Kayıt Ol</div>
    <div class="footer-apps">
        <a href="https://correctisis-rgb.github.io/yakit/" class="app-box" target="_blank">
            <span>Diğer Uygulamalarımız</span>
            <span class="app-icon">⛽</span>
            <span class="app-label">Yakıt Hesaplama</span>
        </a>
    </div>
</div>

<div class="container hidden" id="signup-screen">
    <h2>KAYIT OL</h2>
    <input type="email" id="signup-email" placeholder="E-posta">
    <input type="password" id="signup-sifre" placeholder="Şifre">
    <button id="btn-kayit-ol" style="background:#ff7e5f;">Hesap Oluştur</button>
    <div class="link-text" id="btn-gecis-giris">Giriş ekranına dön</div>
</div>

<div class="container hidden" id="reset-screen">
    <h2>ŞİFRE SIFIRLA</h2>
    <input type="email" id="reset-email" placeholder="Kayıtlı E-posta adresiniz">
    <button id="btn-sifre-onay-mail" style="background:#f59e0b;">Gönder</button>
    <div class="link-text" id="btn-gecis-giris-2">Giriş ekranına dön</div>
</div>

<div class="container hidden" id="app-screen">
    <div class="profile-btn" id="profil-baslik"></div>
    <div id="profil-menu" class="hidden">
        <small id="user-email" style="display:block; margin-bottom:5px; color:black;"></small>
        <button id="btn-sifre-guncelle-menu" style="background:#f59e0b; width:100%; padding:5px; border-radius:5px; margin-bottom:2px;">Şifre Değiştir</button>
        <button id="btn-bildir-menu" style="background:#3b82f6; width:100%; padding:5px; border-radius:5px; margin-bottom:2px;">Sorun Bildir</button>
        <button id="btn-kahve-menu" style="background:#6f4e37; width:100%; padding:5px; border-radius:5px; margin-bottom:2px; color:white;">☕ Kahve Ismarla</button>
        <button id="btn-cikis" style="background:#666; width:100%; padding:5px; border-radius:5px;">Çıkış Yap</button>
    </div>

    <div id="sifre-panel" class="hidden" style="margin-top:5px; padding:8px; background:rgba(255,255,255,0.1); border-radius:10px;">
        <button class="close-btn" onclick="kapatPaneller()">KAPAT X</button>
        <input type="password" id="mevcut-sifre" placeholder="Mevcut Şifre">
        <input type="password" id="yeni-sifre" placeholder="Yeni Şifre">
        <button id="btn-sifre-onayla" style="background:#f59e0b;">Onayla</button>
    </div>

    <div id="bildirim-panel" class="hidden" style="margin-top:5px; padding:8px; background:rgba(255,255,255,0.1); border-radius:10px;">
        <button class="close-btn" onclick="kapatPaneller()">KAPAT X</button>
        <textarea id="bildirim-metni" placeholder="Sorununuzu veya önerinizi yazın..." style="height:60px;"></textarea>
        <button id="btn-bildirim-gonder" style="background:#3b82f6;">Gönder</button>
    </div>

    <div id="kahve-panel" class="hidden" style="margin-top:5px; padding:8px; background:rgba(255,255,255,0.1); border-radius:10px;">
        <button class="close-btn" onclick="kapatPaneller()">KAPAT X</button>
        <p style="margin:0 0 5px 0; font-size:12px;">Desteğin için teşekkürler!</p>
        <div class="coffee-grid">
            <a href="https://www.shopier.com/bikahveismarlaa/48102373" target="_blank" style="text-decoration:none;"><button style="background:#a1887f; font-size:10px;">☕<br>Küçük</button></a>
            <a href="https://www.shopier.com/bikahveismarlaa/48099937" target="_blank" style="text-decoration:none;"><button style="background:#795548; font-size:10px;">☕☕<br>Orta</button></a>
            <a href="https://www.shopier.com/bikahveismarlaa/48102387" target="_blank" style="text-decoration:none;"><button style="background:#5d4037; font-size:10px;">☕☕☕<br>Büyük</button></a>
        </div>
    </div>

    <div class="nav-container">
        <span class="nav-btn" id="btn-onceki">&lt;</span>
        <h3 id="ay-baslik"></h3>
        <span class="nav-btn" id="btn-sonraki">&gt;</span>
    </div>

    <h3>BAKİYE: <span id="bakiye" style="color: white;">0</span> TL</h3>
    <input type="text" id="aciklama" placeholder="Açıklama">
    <input type="text" id="tutar" placeholder="Tutar" inputmode="decimal">
    <input type="date" id="tarih" style="padding: 5px; color: #555;">
    
    <select id="kategori">
        <option value="Genel">Genel</option>
        <option value="Maaş">Maaş</option>
        <option value="Market">Market</option>
        <option value="Fatura">Fatura</option>
        <option value="Ulaşım">Ulaşım</option>
        <option value="Eğlence">Eğlence</option>
        <option value="Diğer">Diğer</option>
    </select>

    <div style="display:flex; gap:5px;">
        <button id="btn-gelir" style="background:#10b981;">GELİR (+)</button>
        <button id="btn-gider" style="background:#ef4444;">GİDER (-)</button>
    </div>
    
    <div class="liste-alani">
        <table id="tablo"></table>
    </div>
    <canvas id="grafik" style="max-height: 120px; margin-top: 5px;"></canvas>

    <div class="footer-apps">
        <a href="https://correctisis-rgb.github.io/yakit/" class="app-box" target="_blank">
            <span>Diğer Uygulamalarımız</span>
            <span class="app-icon">⛽</span>
            <span class="app-label">Yakıt Hesaplama</span>
        </a>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, query, where, onSnapshot, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged, reauthenticateWithCredential, updatePassword, EmailAuthProvider, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getMessaging, getToken } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-messaging.js";

    const firebaseConfig = { apiKey: "AIzaSyDExT8MXCnvDCckai4MPZaHyWlVb5wifVw", authDomain: "cuzdan-99641.firebaseapp.com", projectId: "cuzdan-99641", storageBucket: "cuzdan-99641.firebasestorage.app", messagingSenderId: "412964017852", appId: "1:412964017852:web:4e8e888a81ddd29d44a2b9", measurementId: "G-4KRR9PSYXP" };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const messaging = getMessaging(app);

    // Servis Worker Kaydı - Kendi özel dosyamızla ilişkilendiriyoruz
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('firebase-messaging-sw.js')
        .then((reg) => console.log('SW Kayıtlı:', reg.scope))
        .catch((err) => console.log('SW Hata:', err));
    }

    async function bildirimIzniAl() {
        try {
            const permission = await Notification.requestPermission();
            if (permission === 'granted') {
                const token = await getToken(messaging, { 
                    vapidKey: 'BKxF7reNqgCfWj6oCQVw9mqg6OljIVEJzEp6OEkwaQZbUHjFxlS-EKKc6ynT5xdZuXTN-uQBoaUAvhO2snzzFH4',
                    serviceWorkerRegistration: await navigator.serviceWorker.ready 
                });
                if (token) {
                    await addDoc(collection(db, "bildirim_tokenlari"), { uid: auth.currentUser.uid, token: token, tarih: Date.now() });
                }
            }
        } catch (err) { console.error("Bildirim hatası:", err); }
    }

    window.kapatPaneller = () => {
        ['sifre-panel', 'bildirim-panel', 'kahve-panel'].forEach(id => document.getElementById(id).classList.add('hidden'));
    };

    // UI Mantığı ve Firebase işlemleri...
    let myChart, seciliTarih = new Date();
    const ayIsimleri = ["Ocak", "Şubat", "Mart", "Nisan", "Mayıs", "Haziran", "Temmuz", "Ağustos", "Eylül", "Ekim", "Kasım", "Aralık"];
    document.getElementById('tarih').valueAsDate = new Date();
    const formatla = (sayi) => sayi.toLocaleString('tr-TR');

    document.getElementById('tutar').oninput = (e) => {
        let val = e.target.value.replace(/\./g, '');
        if (!isNaN(val) && val !== "") e.target.value = new Intl.NumberFormat('tr-TR').format(val);
        else e.target.value = val;
    };

    const hataGoster = (err) => { alert(err.message); };
    const ekranGoster = (id) => {
        ['auth-screen', 'signup-screen', 'reset-screen', 'app-screen'].forEach(s => document.getElementById(s).classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    };

    onAuthStateChanged(auth, (user) => {
        if (user) {
            ekranGoster('app-screen');
            document.getElementById('profil-baslik').innerText = user.email[0].toUpperCase();
            document.getElementById('user-email').innerText = user.email;
            verileriGetir(user.uid);
            bildirimIzniAl();
        } else { ekranGoster('auth-screen'); }
    });

    // Buton event listenerları
    document.getElementById('btn-giris-yap').onclick = () => { signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('sifre').value).catch(hataGoster); };
    document.getElementById('btn-kayit-ol').onclick = () => { createUserWithEmailAndPassword(auth, document.getElementById('signup-email').value, document.getElementById('signup-sifre').value).catch(hataGoster); };
    document.getElementById('btn-sifre-onay-mail').onclick = async () => { await sendPasswordResetEmail(auth, document.getElementById('reset-email').value).then(() => alert("E-posta gönderildi.")).catch(hataGoster); };
    document.getElementById('btn-gecis-kayit').onclick = () => ekranGoster('signup-screen');
    document.getElementById('btn-gecis-giris').onclick = () => ekranGoster('auth-screen');
    document.getElementById('btn-gecis-giris-2').onclick = () => ekranGoster('auth-screen');
    document.getElementById('btn-gecis-sifre-sifirla').onclick = () => ekranGoster('reset-screen');
    document.getElementById('btn-cikis').onclick = () => signOut(auth);
    document.getElementById('profil-baslik').onclick = () => document.getElementById('profil-menu').classList.toggle('hidden');
    
    document.getElementById('btn-sifre-guncelle-menu').onclick = () => { kapatPaneller(); document.getElementById('sifre-panel').classList.remove('hidden'); document.getElementById('profil-menu').classList.add('hidden'); };
    document.getElementById('btn-bildir-menu').onclick = () => { kapatPaneller(); document.getElementById('bildirim-panel').classList.remove('hidden'); document.getElementById('profil-menu').classList.add('hidden'); };
    document.getElementById('btn-kahve-menu').onclick = () => { kapatPaneller(); document.getElementById('kahve-panel').classList.remove('hidden'); document.getElementById('profil-menu').classList.add('hidden'); };

    document.getElementById('btn-bildirim-gonder').onclick = async () => {
        const metin = document.getElementById('bildirim-metni').value;
        if (!metin) return;
        await addDoc(collection(db, "bildirimler"), { uid: auth.currentUser.uid, email: auth.currentUser.email, mesaj: metin, tarih: Date.now() });
        alert("Gönderildi!"); document.getElementById('bildirim-metni').value = ''; kapatPaneller();
    };

    document.getElementById('btn-sifre-onayla').onclick = async () => {
        try {
            await reauthenticateWithCredential(auth.currentUser, EmailAuthProvider.credential(auth.currentUser.email, document.getElementById('mevcut-sifre').value));
            await updatePassword(auth.currentUser, document.getElementById('yeni-sifre').value);
            alert("Şifre güncellendi!"); kapatPaneller();
        } catch (e) { alert("Hata: " + e.message); }
    };

    document.getElementById('btn-onceki').onclick = () => { seciliTarih.setMonth(seciliTarih.getMonth() - 1); verileriGetir(auth.currentUser.uid); };
    document.getElementById('btn-sonraki').onclick = () => { seciliTarih.setMonth(seciliTarih.getMonth() + 1); verileriGetir(auth.currentUser.uid); };

    function verileriGetir(uid) {
        document.getElementById('ay-baslik').innerText = `${ayIsimleri[seciliTarih.getMonth()]} ${seciliTarih.getFullYear()}`;
        onSnapshot(query(collection(db, "islemler"), where("uid", "==", uid)), (snapshot) => {
            let bakiye = 0, veriler = [];
            const kategoriToplamlar = { 'Gelir': 0, 'Genel': 0, 'Maaş': 0, 'Market': 0, 'Fatura': 0, 'Ulaşım': 0, 'Eğlence': 0, 'Diğer': 0 };
            snapshot.forEach(d => {
                const data = d.data();
                const t = new Date(data.tarih);
                if (t.getMonth() === seciliTarih.getMonth() && t.getFullYear() === seciliTarih.getFullYear()) {
                    veriler.push({ id: d.id, ...data });
                    if(data.tur === 'gelir') { bakiye += data.tutar; kategoriToplamlar['Gelir'] += data.tutar; } 
                    else { bakiye -= data.tutar; const kat = data.kategori || 'Genel'; kategoriToplamlar[kat] = (kategoriToplamlar[kat] || 0) + data.tutar; }
                }
            });
            const bakiyeSpan = document.getElementById('bakiye');
            bakiyeSpan.innerText = formatla(bakiye);
            bakiyeSpan.style.color = (bakiye < 0) ? "#ef4444" : "white";
            let html = "";
            veriler.sort((a, b) => b.tarih - a.tarih).forEach(d => {
                const t = new Date(d.tarih);
                const tarihStr = t.toLocaleDateString('tr-TR', { day:'2-digit', month:'2-digit' });
                html += `<tr><td><strong>${d.aciklama}</strong><br><small>${d.kategori} • ${tarihStr}</small></td>
                           <td style="color:${d.tur==='gelir'?'#00ff9d':'#ff4d4d'}; font-weight:bold;">${formatla(d.tutar)} TL</td>
                           <td><button onclick="window.sil('${d.id}')" style="background:none;">❌</button></td></tr>`;
            });
            document.getElementById('tablo').innerHTML = html;
            const etiketler = Object.keys(kategoriToplamlar).filter(k => kategoriToplamlar[k] > 0);
            const degerler = etiketler.map(k => kategoriToplamlar[k]);
            const ctx = document.getElementById('grafik').getContext('2d');
            if (myChart) myChart.destroy();
            if (etiketler.length > 0) {
                myChart = new Chart(ctx, { type: 'doughnut', data: { labels: etiketler, datasets: [{ data: degerler, backgroundColor: ['#10b981', '#94a3b8', '#f87171', '#fbbf24', '#34d399', '#60a5fa', '#a78bfa'] }] }, options: { plugins: { legend: { position: 'right', labels: { color: 'white', font: { size: 9 } } } } } });
            }
        });
    }

    async function ekle(tur) {
        const aciklama = document.getElementById('aciklama').value;
        const kategori = document.getElementById('kategori').value;
        const tutarVal = document.getElementById('tutar').value.replace(/\./g, '');
        const tutar = parseFloat(tutarVal);
        const tarihVal = document.getElementById('tarih').value;
        if (!aciklama) return alert("Açıklama girin.");
        if (isNaN(tutar) || tutar <= 0) return alert("Geçerli tutar girin.");
        if (!tarihVal) return alert("Tarih seçin.");
        const tarihObj = new Date(tarihVal);
        tarihObj.setHours(12, 0, 0, 0); 
        await addDoc(collection(db, "islemler"), { uid: auth.currentUser.uid, aciklama, tutar, tur, kategori, tarih: tarihObj.getTime() });
        document.getElementById('aciklama').value = ''; document.getElementById('tutar').value = '';
    }
    document.getElementById('btn-gelir').onclick = () => ekle('gelir');
    document.getElementById('btn-gider').onclick = () => ekle('gider');
    window.sil = (id) => deleteDoc(doc(db, "islemler", id));
</script>
</body>
</html>
