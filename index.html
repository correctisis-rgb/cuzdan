<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartWallet | Cloud</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); display: flex; justify-content: center; align-items: center; min-height: 100vh; color: white; padding: 20px; }
        .container { background: rgba(255, 255, 255, 0.15); padding: 2rem; border-radius: 20px; backdrop-filter: blur(10px); box-shadow: 0 8px 32px rgba(0,0,0,0.3); width: 350px; text-align: center; position: relative; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: none; border-radius: 10px; box-sizing: border-box; }
        button { padding: 10px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; color: white; width: 100%; margin-top: 5px; }
        .hidden { display: none !important; }
        .link-text { margin-top: 15px; font-size: 14px; cursor: pointer; text-decoration: underline; color: #e0e0e0; }
        table { width: 100%; margin-top: 20px; border-collapse: collapse; }
        td { padding: 8px; border-bottom: 1px solid rgba(255,255,255,0.2); text-align: left; }
        .profile-btn { position: absolute; top: 15px; right: 15px; background: #fff; color: #764ba2; border-radius: 50%; width: 35px; height: 35px; cursor: pointer; font-weight: bold; line-height: 35px; }
        #profil-menu { position: absolute; top: 55px; right: 15px; background: white; color: black; padding: 10px; border-radius: 10px; z-index: 10; }
    </style>
</head>
<body>

<div class="container" id="auth-screen">
    <h2>SmartWallet Giriş</h2>
    <input type="email" id="email" placeholder="E-posta">
    <input type="password" id="sifre" placeholder="Şifre">
    <button id="btn-giris" style="background:#10b981;">Giriş Yap</button>
    
    <div class="link-text" id="btn-sifremi-unuttum">Şifremi Unuttum</div>
    <div class="link-text" id="btn-kayit-gecis">Üye değilseniz, hemen kayıt olun.</div>
</div>

<div class="container hidden" id="app-screen">
    <div class="profile-btn" id="profil-baslik" onclick="document.getElementById('profil-menu').classList.toggle('hidden')"></div>
    <div id="profil-menu" class="hidden">
        <small id="user-email"></small><br>
        <button id="btn-cikis" style="background:#666; margin-top:10px;">Çıkış Yap</button>
    </div>
    <h3>Bakiye: <span id="bakiye">0</span> TL</h3>
    <input type="text" id="aciklama" placeholder="Açıklama">
    <input type="number" id="tutar" placeholder="Tutar">
    <div style="display:flex; gap:10px;">
        <button id="btn-gelir" style="background:#10b981;">Gelir (+)</button>
        <button id="btn-gider" style="background:#ef4444;">Gider (-)</button>
    </div>
    <table id="tablo"></table>
    <canvas id="grafik" width="200" height="200" style="margin-top: 20px;"></canvas>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, collection, addDoc, query, where, onSnapshot, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyDExT8MXCnvDCckai4MPZaHyWlVb5wifVw",
  authDomain: "cuzdan-99641.firebaseapp.com",
  projectId: "cuzdan-99641",
  storageBucket: "cuzdan-99641.firebasestorage.app",
  messagingSenderId: "412964017852",
  appId: "1:412964017852:web:4e8e888a81ddd29d44a2b9",
  measurementId: "G-4KRR9PSYXP"
};

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    let myChart;

    // Şifre Sıfırlama Fonksiyonu
    document.getElementById('btn-sifremi-unuttum').onclick = () => {
        const email = document.getElementById('email').value;
        if(!email) return alert("Lütfen önce e-posta adresinizi girin.");
        sendPasswordResetEmail(auth, email).then(() => alert("Şifre sıfırlama e-postası gönderildi.")).catch(e => alert(e.message));
    };

    // Kayıt Olma Fonksiyonu
    document.getElementById('btn-kayit-gecis').onclick = () => {
        const email = document.getElementById('email').value;
        const sifre = document.getElementById('sifre').value;
        if(!email || !sifre) return alert("E-posta ve şifre gerekli.");
        createUserWithEmailAndPassword(auth, email, sifre).catch(e => alert(e.message));
    };

    // Giriş yap, Çıkış yap vb. kodlar aynı kalıyor...
    document.getElementById('btn-giris').onclick = () => signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('sifre').value).catch(e => alert(e.message));
    document.getElementById('btn-cikis').onclick = () => signOut(auth);
    document.getElementById('btn-gelir').onclick = () => ekle('gelir');
    document.getElementById('btn-gider').onclick = () => ekle('gider');

    // ... Diğer verileriGetir ve ekle fonksiyonların burada ...
    // (Aynı şekilde verileriGetir fonksiyonunu ve ekle fonksiyonunu eklemeyi unutma)
</script>
</body>
</html>
