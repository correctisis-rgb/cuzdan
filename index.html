<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SmartWallet | Premium</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;800&display=swap');
        
        body { margin: 0; font-family: 'Outfit', sans-serif; background: linear-gradient(135deg, #0f172a 0%, #334155 100%); display: flex; justify-content: center; align-items: center; min-height: 100vh; color: white; padding: 20px; }
        
        .container { background: rgba(255, 255, 255, 0.05); padding: 2.5rem; border-radius: 30px; backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 20px 50px rgba(0,0,0,0.5); width: 350px; text-align: center; }
        
        h2 { font-weight: 800; font-size: 24px; margin-bottom: 25px; letter-spacing: -0.5px; }
        h3 { font-weight: 800; font-size: 20px; margin-bottom: 20px; }
        
        input { width: 100%; padding: 15px; margin: 10px 0; border: 2px solid rgba(255,255,255,0.1); border-radius: 15px; background: rgba(0,0,0,0.2); color: white; font-size: 16px; font-weight: 600; box-sizing: border-box; }
        
        button { padding: 15px; border: none; border-radius: 15px; font-weight: 800; cursor: pointer; color: white; width: 100%; margin-top: 10px; transition: transform 0.2s; text-transform: uppercase; letter-spacing: 1px; }
        button:active { transform: scale(0.98); }
        
        .hidden { display: none !important; }
        .link-text { margin-top: 20px; font-size: 14px; cursor: pointer; text-decoration: underline; color: #94a3b8; font-weight: 600; }
        
        table { width: 100%; margin-top: 25px; border-collapse: separate; border-spacing: 0 10px; }
        tr { background: rgba(255,255,255,0.03); border-radius: 15px; }
        td { padding: 15px; }
        
        .profile-btn { position: absolute; top: 20px; right: 20px; background: #38bdf8; color: #0f172a; border-radius: 50%; width: 45px; height: 45px; cursor: pointer; font-weight: 800; font-size: 20px; line-height: 45px; }
    </style>
</head>
<body>

<div class="container" id="auth-screen">
    <h2>SMARTWALLET</h2>
    <input type="email" id="email" placeholder="E-posta">
    <input type="password" id="sifre" placeholder="Şifre">
    <button id="btn-giris-yap" style="background:#38bdf8; color:#0f172a;">GİRİŞ YAP</button>
    <div class="link-text" id="btn-gecis-kayit">Henüz üye değil misin? Kayıt Ol</div>
</div>

<div class="container hidden" id="signup-screen">
    <h2>KAYIT OL</h2>
    <input type="email" id="signup-email" placeholder="E-posta">
    <input type="password" id="signup-sifre" placeholder="Şifre">
    <button id="btn-kayit-ol" style="background:#fb7185;">HESAP OLUŞTUR</button>
    <div class="link-text" id="btn-gecis-giris">Giriş ekranına dön</div>
</div>

<div class="container hidden" id="app-screen">
    <div class="profile-btn" id="profil-baslik"></div>
    <h3>BAKİYE: <span id="bakiye" style="color:#38bdf8;">0</span> TL</h3>
    <input type="text" id="aciklama" placeholder="Açıklama">
    <input type="number" id="tutar" placeholder="Tutar">
    <div style="display:flex; gap:10px;">
        <button id="btn-gelir" style="background:#10b981;">GELİR (+)</button>
        <button id="btn-gider" style="background:#ef4444;">GİDER (-)</button>
    </div>
    <table id="tablo"></table>
    <canvas id="grafik" style="margin-top: 30px;"></canvas>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, query, where, onSnapshot, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged, sendPasswordResetEmail, updatePassword, EmailAuthProvider, reauthenticateWithCredential } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDExT8MXCnvDCckai4MPZaHyWlVb5wifVw",
        authDomain: "cuzdan-99641.firebaseapp.com",
        projectId: "cuzdan-99641",
        storageBucket: "cuzdan-99641.firebasestorage.app",
        messagingSenderId: "412964017852",
        appId: "1:412964017852:web:4e8e888a81ddd29d44a2b9",
        measurementId: "G-4KRR9PSYXP"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    let myChart;

    function hataCevir(code) {
        const mesajlar = {
            'auth/email-already-in-use': "Bu e-posta adresi zaten kayıtlı.",
            'auth/invalid-credential': "E-posta veya şifre hatalı.",
            'auth/wrong-password': "Mevcut şifreniz yanlış.",
            'auth/weak-password': "Şifre en az 6 karakter olmalı."
        };
        return mesajlar[code] || "Hata: " + code;
    }

    const ekranGoster = (ekranId) => {
        ['auth-screen', 'signup-screen', 'app-screen'].forEach(id => document.getElementById(id).classList.add('hidden'));
        document.getElementById(ekranId).classList.remove('hidden');
    };

    onAuthStateChanged(auth, (user) => {
        if (user) {
            ekranGoster('app-screen');
            document.getElementById('profil-baslik').innerText = user.email[0].toUpperCase();
            verileriGetir(user.uid);
        } else {
            ekranGoster('auth-screen');
        }
    });

    document.getElementById('btn-giris-yap').onclick = () => signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('sifre').value).catch(e => alert(hataCevir(e.code)));
    document.getElementById('btn-gecis-kayit').onclick = () => ekranGoster('signup-screen');
    document.getElementById('btn-gecis-giris').onclick = () => ekranGoster('auth-screen');
    document.getElementById('btn-kayit-ol').onclick = () => createUserWithEmailAndPassword(auth, document.getElementById('signup-email').value, document.getElementById('signup-sifre').value).then(() => alert("Kayıt Başarılı!")).catch(e => alert(hataCevir(e.code)));
    document.getElementById('btn-cikis').onclick = () => signOut(auth);

    document.getElementById('btn-gelir').onclick = () => ekle('gelir');
    document.getElementById('btn-gider').onclick = () => ekle('gider');

    async function ekle(tur) {
        const aciklama = document.getElementById('aciklama').value;
        const tutar = parseFloat(document.getElementById('tutar').value);
        if(!aciklama || !tutar) return;
        await addDoc(collection(db, "islemler"), { uid: auth.currentUser.uid, aciklama, tutar, tur, tarih: Date.now() });
        document.getElementById('aciklama').value = ''; document.getElementById('tutar').value = '';
    }

    function guncelleGrafik(gelir, gider) {
        const ctx = document.getElementById('grafik').getContext('2d');
        if (myChart) myChart.destroy();
        myChart = new Chart(ctx, { type: 'doughnut', data: { labels: ['Gelir', 'Gider'], datasets: [{ data: [gelir, gider], backgroundColor: ['#10b981', '#ef4444'] }] } });
    }

    function verileriGetir(uid) {
        const q = query(collection(db, "islemler"), where("uid", "==", uid));
        onSnapshot(q, (snapshot) => {
            let bakiye = 0, g = 0, gi = 0, veriler = [];
            snapshot.forEach(d => veriler.push({ id: d.id, ...d.data() }));
            veriler.sort((a, b) => b.tarih - a.tarih);
            
            let html = "";
            veriler.forEach(d => {
                if(d.tur === 'gelir') { bakiye += d.tutar; g += d.tutar; } else { bakiye -= d.tutar; gi += d.tutar; }
                const t = new Date(d.tarih);
                html += `<tr>
                    <td style="text-align:left;">
                        <div style="font-weight:800; font-size:16px;">${d.aciklama}</div>
                        <div style="font-size:12px; color:#94a3b8; font-weight:600;">${d.tur.toUpperCase()} • ${t.toLocaleDateString('tr-TR')} ${t.toLocaleTimeString('tr-TR', {hour:'2-digit', minute:'2-digit'})}</div>
                    </td>
                    <td style="font-weight:800; color:${d.tur==='gelir'?'#10b981':'#ef4444'}; font-size:16px;">${d.tutar} TL</td>
                    <td><button onclick="window.sil('${d.id}')" style="background:none; border:none; cursor:pointer;">❌</button></td>
                </tr>`;
            });
            document.getElementById('bakiye').innerText = bakiye;
            document.getElementById('tablo').innerHTML = html;
            guncelleGrafik(g, gi);
        });
    }
    window.sil = (id) => deleteDoc(doc(db, "islemler", id));
</script>
</body>
</html>
