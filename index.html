<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartWallet</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, where, onSnapshot, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDExT8MXCnvdCCkai4MPZaHyWlVb5wifVw",
            authDomain: "cuzdan-99641.firebaseapp.com",
            projectId: "cuzdan-99641",
            storageBucket: "cuzdan-99641.firebasestorage.app",
            messagingSenderId: "412964017852",
            appId: "1:412964017852:web:4e8e888a81ddd29d44a2b9"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // UI Kontrolü
        onAuthStateChanged(auth, (user) => {
            const authScreen = document.getElementById('auth-screen');
            const appScreen = document.getElementById('app-screen');
            if (user) {
                authScreen.style.display = 'none';
                appScreen.style.display = 'block';
                verileriGetir(user.uid);
            } else {
                authScreen.style.display = 'block';
                appScreen.style.display = 'none';
            }
        });

        // Buton Fonksiyonlarını Global'e Tanımla
        window.kayitOl = () => {
            const email = document.getElementById('email').value;
            const sifre = document.getElementById('sifre').value;
            createUserWithEmailAndPassword(auth, email, sifre).catch(e => alert(e.message));
        };

        window.girisYap = () => {
            const email = document.getElementById('email').value;
            const sifre = document.getElementById('sifre').value;
            signInWithEmailAndPassword(auth, email, sifre).catch(e => alert(e.message));
        };

        window.cikisYap = () => signOut(auth);

        window.ekle = (tur) => {
            const aciklama = document.getElementById('aciklama').value;
            const tutar = parseFloat(document.getElementById('tutar').value);
            addDoc(collection(db, "islemler"), { uid: auth.currentUser.uid, aciklama, tutar, tur, tarih: Date.now() });
        };

        window.sil = (id) => deleteDoc(doc(db, "islemler", id));

        function verileriGetir(uid) {
            const q = query(collection(db, "islemler"), where("uid", "==", uid));
            onSnapshot(q, (snapshot) => {
                let bakiye = 0, html = "";
                snapshot.forEach(doc => {
                    const d = doc.data();
                    bakiye += (d.tur === 'gelir' ? d.tutar : -d.tutar);
                    html += `<tr><td>${d.aciklama}</td><td>${d.tutar} TL</td><td><button onclick="sil('${doc.id}')">X</button></td></tr>`;
                });
                document.getElementById('bakiye').innerText = bakiye;
                document.getElementById('tablo-govde').innerHTML = html;
            });
        }
    </script>
</head>
<body>
    <div id="auth-screen">
        <input type="email" id="email" placeholder="E-posta">
        <input type="password" id="sifre" placeholder="Şifre">
        <button onclick="kayitOl()">Kayıt Ol</button>
        <button onclick="girisYap()">Giriş Yap</button>
    </div>
    <div id="app-screen" style="display:none;">
        <h3>Bakiye: <span id="bakiye">0</span> TL</h3>
        <input type="text" id="aciklama" placeholder="Açıklama">
        <input type="number" id="tutar" placeholder="Tutar">
        <button onclick="ekle('gelir')">Gelir</button>
        <button onclick="ekle('gider')">Gider</button>
        <table><tbody id="tablo-govde"></tbody></table>
        <button onclick="cikisYap()">Çıkış Yap</button>
    </div>
</body>
</html>
