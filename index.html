<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SmartWallet | Cloud</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, query, where, onSnapshot, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // For Firebase JS SDK v7.20.0 and later, measurementId is optional
        const firebaseConfig = {
          apiKey: "AIzaSyDExT8MXCnvDCckai4MPZaHyWlVb5wifVw",
          authDomain: "cuzdan-99641.firebaseapp.com",
          projectId: "cuzdan-99641",
          storageBucket: "cuzdan-99641.firebasestorage.app",
          messagingSenderId: "412964017852",
          appId: "1:412964017852:web:4e8e888a81ddd29d44a2b9",
          measurementId: "G-4KRR9PSYXP"
        };

        const app = initializeApp(firebaseConfig);
        
        // Firebase nesnelerini global window'a taşıyoruz ki butonlar hata vermesin
        window.db = getFirestore(app);
        window.auth = getAuth(app);
        window.collection = collection;
        window.addDoc = addDoc;
        window.query = query;
        window.where = where;
        window.onSnapshot = onSnapshot;
        window.deleteDoc = deleteDoc;
        window.doc = doc;
        window.createUserWithEmailAndPassword = createUserWithEmailAndPassword;
        window.signInWithEmailAndPassword = signInWithEmailAndPassword;
        window.signOut = signOut;
        window.onAuthStateChanged = onAuthStateChanged;
    </script>
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); display: flex; justify-content: center; align-items: center; min-height: 100vh; color: white; padding: 20px; }
        .container { background: rgba(255, 255, 255, 0.15); padding: 2rem; border-radius: 20px; backdrop-filter: blur(10px); box-shadow: 0 8px 32px rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.2); width: 350px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: none; border-radius: 10px; box-sizing: border-box; font-size: 16px; }
        button { padding: 10px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; color: white; margin-top: 5px; width: 100%; background: #ff7e5f; }
        .hidden { display: none !important; }
        table { width: 100%; margin-top: 20px; border-collapse: collapse; }
        td { padding: 8px; border-bottom: 1px solid rgba(255,255,255,0.2); text-align: left; }
    </style>
</head>
<body>

<div class="container" id="auth-screen">
    <h2>SmartWallet Giriş</h2>
    <input type="email" id="email" placeholder="E-posta">
    <input type="password" id="sifre" placeholder="Şifre">
    <button onclick="kayitOl()">Kayıt Ol</button>
    <button onclick="girisYap()" style="background:#10b981; margin-top:10px;">Giriş Yap</button>
</div>

<div class="container hidden" id="app-screen">
    <h3>Bakiye: <span id="bakiye">0</span> TL</h3>
    <input type="text" id="aciklama" placeholder="Açıklama">
    <input type="number" id="tutar" placeholder="Tutar">
    <div style="display:flex; gap:10px;">
        <button onclick="ekle('gelir')" style="background:#10b981;">Gelir (+)</button>
        <button onclick="ekle('gider')" style="background:#ef4444;">Gider (-)</button>
    </div>
    <table><tbody id="tablo-govde"></tbody></table>
    <button onclick="signOut(window.auth)" style="background:#666; margin-top:20px;">Çıkış Yap</button>
</div>

<script>
    // Auth durumunu dinle
    window.onAuthStateChanged(window.auth, (user) => {
        if (user) {
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('app-screen').classList.remove('hidden');
            verileriGetir(user.uid);
        } else {
            document.getElementById('auth-screen').classList.remove('hidden');
            document.getElementById('app-screen').classList.add('hidden');
        }
    });

    async function kayitOl() {
        try { await window.createUserWithEmailAndPassword(window.auth, document.getElementById('email').value, document.getElementById('sifre').value); }
        catch(e) { alert(e.message); }
    }

    async function girisYap() {
        try { await window.signInWithEmailAndPassword(window.auth, document.getElementById('email').value, document.getElementById('sifre').value); }
        catch(e) { alert(e.message); }
    }

    async function ekle(tur) {
        const aciklama = document.getElementById('aciklama').value;
        const tutar = parseFloat(document.getElementById('tutar').value);
        if(!aciklama || !tutar) return;
        await window.addDoc(window.collection(window.db, "islemler"), { uid: window.auth.currentUser.uid, aciklama, tutar, tur, tarih: Date.now() });
    }

    async function sil(id) { await window.deleteDoc(window.doc(window.db, "islemler", id)); }

    function verileriGetir(uid) {
        const q = window.query(window.collection(window.db, "islemler"), window.where("uid", "==", uid));
        window.onSnapshot(q, (snapshot) => {
            let bakiye = 0, html = "";
            snapshot.forEach(doc => {
                const d = doc.data();
                bakiye += (d.tur === 'gelir' ? d.tutar : -d.tutar);
                html += `<tr><td>${d.aciklama}</td><td>${d.tutar} TL</td><td><button onclick="sil('${doc.id}')" style="background:red; width:30px;">X</button></td></tr>`;
            });
            document.getElementById('bakiye').innerText = bakiye;
            document.getElementById('tablo-govde').innerHTML = html;
        });
    }
</script>
</body>
</html>
