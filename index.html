<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SmartWallet | Cloud</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); display: flex; justify-content: center; align-items: center; min-height: 100vh; color: white; padding: 20px; }
        .container { background: rgba(255, 255, 255, 0.15); padding: 2rem; border-radius: 20px; backdrop-filter: blur(10px); box-shadow: 0 8px 32px rgba(0,0,0,0.3); width: 350px; text-align: center; position: relative; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: none; border-radius: 10px; box-sizing: border-box; font-size: 16px; }
        button { padding: 10px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; color: white; width: 100%; margin-top: 5px; }
        .hidden { display: none !important; }
        .link-text { margin-top: 15px; font-size: 13px; cursor: pointer; text-decoration: underline; color: #e0e0e0; }
        table { width: 100%; margin-top: 20px; border-collapse: collapse; }
        td { padding: 8px; border-bottom: 1px solid rgba(255,255,255,0.2); text-align: left; }
        .profile-btn { position: absolute; top: 15px; right: 15px; background: #fff; color: #764ba2; border-radius: 50%; width: 35px; height: 35px; cursor: pointer; font-weight: bold; line-height: 35px; }
        #profil-menu { position: absolute; top: 55px; right: 15px; background: white; color: black; padding: 10px; border-radius: 10px; z-index: 10; text-align: left; }
    </style>
</head>
<body>

<div class="container" id="auth-screen">
    <h2>SmartWallet Giriş</h2>
    <input type="email" id="email" placeholder="E-posta">
    <input type="password" id="sifre" placeholder="Şifre">
    <button id="btn-giris-yap" style="background:#10b981;">Giriş Yap</button>
    <div class="link-text" id="btn-sifremi-unuttum">Şifremi Unuttum</div>
    <div class="link-text" id="btn-kayit-ol">Üye değilseniz, hemen kayıt olun.</div>
</div>

<div class="container hidden" id="app-screen">
    <div class="profile-btn" id="profil-baslik"></div>
    <div id="profil-menu" class="hidden">
        <small id="user-email" style="display:block; margin-bottom:5px; color:black;"></small>
        <button id="btn-sifre-guncelle-menu" style="background:#f59e0b; width:100%; padding:8px; border:none; border-radius:5px; color:white; font-weight:bold; cursor:pointer; margin-bottom:5px;">Şifre Değiştir</button>
        <button id="btn-cikis" style="background:#666; width:100%; padding:8px; border:none; border-radius:5px; color:white; font-weight:bold; cursor:pointer;">Çıkış Yap</button>
    </div>

    <div id="sifre-panel" class="hidden" style="margin-top:20px; border-top: 1px solid rgba(255,255,255,0.2); pt: 10px;">
        <input type="password" id="mevcut-sifre" placeholder="Mevcut Şifre">
        <input type="password" id="yeni-sifre" placeholder="Yeni Şifre">
        <button id="btn-sifre-onayla" style="background:#f59e0b;">Şifreyi Güncelle</button>
    </div>

    <h3>Bakiye: <span id="bakiye">0</span> TL</h3>
    <input type="text" id="aciklama" placeholder="Açıklama">
    <input type="number" id="tutar" placeholder="Tutar">
    <div style="display:flex; gap:10px;">
        <button id="btn-gelir" style="background:#10b981;">Gelir (+)</button>
        <button id="btn-gider" style="background:#ef4444;">Gider (-)</button>
    </div>
    <table id="tablo"></table>
    <canvas id="grafik" style="margin-top: 20px;"></canvas>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, query, where, onSnapshot, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged, sendPasswordResetEmail, updatePassword, EmailAuthProvider, reauthenticateWithCredential } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDExT8MXCnvDCckai4MPZaHyWlVb5wifVw",
        authDomain: "cuzdan-99641.firebaseapp.com",
        projectId: "cuzdan-99641",
        storageBucket: "cuzdan-99641.firebasestorage.app",
        messagingSenderId: "412964017852",
        appId: "1:412964017852:web:4e8e888a81ddd29d44a2b9",
        measurementId: "G-4KRR9PSYXP"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    let myChart;

    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('app-screen').classList.remove('hidden');
            document.getElementById('profil-baslik').innerText = user.email[0].toUpperCase();
            document.getElementById('user-email').innerText = user.email;
            verileriGetir(user.uid);
        } else {
            document.getElementById('auth-screen').classList.remove('hidden');
            document.getElementById('app-screen').classList.add('hidden');
        }
    });

    document.getElementById('btn-giris-yap').onclick = () => signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('sifre').value).catch(e => alert(e.message));
    document.getElementById('btn-kayit-ol').onclick = () => createUserWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('sifre').value).catch(e => alert(e.message));
    document.getElementById('btn-sifremi-unuttum').onclick = () => {
        const email = document.getElementById('email').value;
        if(!email) return alert("E-posta giriniz.");
        sendPasswordResetEmail(auth, email).then(() => alert("Sıfırlama linki gönderildi.")).catch(e => alert(e.message));
    };
    
    document.getElementById('profil-baslik').onclick = () => document.getElementById('profil-menu').classList.toggle('hidden');
    document.getElementById('btn-cikis').onclick = () => signOut(auth);

    // Şifre Değiştirme Paneli Açma
    document.getElementById('btn-sifre-guncelle-menu').onclick = () => {
        document.getElementById('sifre-panel').classList.remove('hidden');
        document.getElementById('profil-menu').classList.add('hidden');
    };

    // Şifre Güncelleme İşlemi
    document.getElementById('btn-sifre-onayla').onclick = async () => {
        const user = auth.currentUser;
        const eski = document.getElementById('mevcut-sifre').value;
        const yeni = document.getElementById('yeni-sifre').value;
        
        try {
            const credential = EmailAuthProvider.credential(user.email, eski);
            await reauthenticateWithCredential(user, credential);
            await updatePassword(user, yeni);
            alert("Şifreniz başarıyla değiştirildi!");
            document.getElementById('sifre-panel').classList.add('hidden');
        } catch(e) { alert("Hata: " + e.message); }
    };

    document.getElementById('btn-gelir').onclick = () => ekle('gelir');
    document.getElementById('btn-gider').onclick = () => ekle('gider');

    async function ekle(tur) {
        const aciklama = document.getElementById('aciklama').value;
        const tutar = parseFloat(document.getElementById('tutar').value);
        if(!aciklama || !tutar) return;
        await addDoc(collection(db, "islemler"), { uid: auth.currentUser.uid, aciklama, tutar, tur, tarih: Date.now() });
    }

    function guncelleGrafik(gelir, gider) {
        const ctx = document.getElementById('grafik').getContext('2d');
        if (myChart) myChart.destroy();
        myChart = new Chart(ctx, { type: 'doughnut', data: { labels: ['Gelir', 'Gider'], datasets: [{ data: [gelir, gider], backgroundColor: ['#10b981', '#ef4444'] }] } });
    }

    function verileriGetir(uid) {
        const q = query(collection(db, "islemler"), where("uid", "==", uid));
        onSnapshot(q, (snapshot) => {
            let bakiye = 0, g = 0, gi = 0, html = "";
            snapshot.forEach(d => {
                const data = d.data();
                if(data.tur === 'gelir') { bakiye += data.tutar; g += data.tutar; } else { bakiye -= data.tutar; gi += data.tutar; }
                html += `<tr><td>${data.aciklama}</td><td>${data.tutar} TL</td><td><button onclick="window.sil('${d.id}')" style="background:#ef4444; color:white; border:none; padding:5px; cursor:pointer;">X</button></td></tr>`;
            });
            document.getElementById('bakiye').innerText = bakiye;
            document.getElementById('tablo').innerHTML = html;
            guncelleGrafik(g, gi);
        });
    }
    window.sil = (id) => deleteDoc(doc(db, "islemler", id));
</script>
</body>
</html>
