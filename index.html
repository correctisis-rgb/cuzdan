<!DOCTYPE html>
<html lang="tr" style="height: 100%; overflow: hidden;">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SmartWallet | Cloud</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        html, body { height: 100%; margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); display: flex; justify-content: center; align-items: center; color: white; }
        .container { background: rgba(255, 255, 255, 0.15); padding: 0.8rem; border-radius: 20px; backdrop-filter: blur(10px); box-shadow: 0 8px 32px rgba(0,0,0,0.3); width: 90%; max-width: 350px; text-align: center; position: relative; max-height: 95vh; display: flex; flex-direction: column; gap: 4px; }
        .profile-btn { position: absolute; top: 10px; right: 10px; background: #fff; color: #764ba2; border-radius: 50%; width: 30px; height: 30px; cursor: pointer; font-weight: 600; line-height: 30px; z-index: 20; }
        #profil-menu { position: absolute; top: 45px; right: 10px; background: white; color: black; padding: 10px; border-radius: 10px; z-index: 30; text-align: left; }
        .nav-container { display: flex; justify-content: center; align-items: center; gap: 10px; margin-top: 25px; }
        .nav-btn { cursor: pointer; padding: 2px 10px; background: rgba(255,255,255,0.2); border-radius: 8px; font-weight: bold; }
        h3 { margin: 2px 0; }
        input, textarea, select { width: 100%; padding: 8px; margin: 2px 0; border: none; border-radius: 10px; font-size: 14px; box-sizing: border-box; font-family: inherit; }
        button { padding: 6px; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; color: white; width: 100%; margin-top: 2px; text-transform: uppercase; }
        .liste-alani { flex-grow: 1; overflow-y: auto; margin-top: 5px; border-top: 1px solid rgba(255,255,255,0.2); }
        table { width: 100%; border-collapse: collapse; }
        td { padding: 4px; border-bottom: 1px solid rgba(255,255,255,0.1); text-align: left; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="container" id="app-screen">
    <div class="profile-btn" id="profil-baslik"></div>
    <div id="profil-menu" class="hidden">
        <button id="btn-cikis" style="background:#666; width:100%; padding:5px; border-radius:5px;">Çıkış Yap</button>
    </div>

    <div class="nav-container">
        <span class="nav-btn" id="btn-onceki">&lt;</span>
        <h3 id="ay-baslik"></h3>
        <span class="nav-btn" id="btn-sonraki">&gt;</span>
    </div>

    <h3>BAKİYE: <span id="bakiye" style="color: white;">0</span> TL</h3>
    <input type="text" id="aciklama" placeholder="Açıklama">
    <input type="text" id="tutar" placeholder="Tutar" inputmode="decimal">
    
    <select id="kategori">
        <option value="Gıda">🛒 Gıda</option>
        <option value="Fatura">💡 Fatura</option>
        <option value="Ulaşım">🚗 Ulaşım</option>
        <option value="Eğlence">🎮 Eğlence</option>
        <option value="Diğer">📋 Diğer</option>
    </select>

    <div style="display:flex; gap:5px;">
        <button id="btn-gelir" style="background:#10b981;">GELİR (+)</button>
        <button id="btn-gider" style="background:#ef4444;">GİDER (-)</button>
    </div>
    
    <div class="liste-alani">
        <table id="tablo"></table>
    </div>
    <canvas id="grafik" style="max-height: 60px; margin-top: 2px;"></canvas>
</div>

<script type="module">
    // ... (Firebase importları ve yapılandırma aynı)
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, query, where, onSnapshot, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    // ... (Firebase init ve global değişkenler aynı)
    const firebaseConfig = { apiKey: "AIzaSyDExT8MXCnvDCckai4MPZaHyWlVb5wifVw", authDomain: "cuzdan-99641.firebaseapp.com", projectId: "cuzdan-99641", storageBucket: "cuzdan-99641.firebasestorage.app", messagingSenderId: "412964017852", appId: "1:412964017852:web:4e8e888a81ddd29d44a2b9", measurementId: "G-4KRR9PSYXP" };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    let myChart, seciliTarih = new Date();
    const ayIsimleri = ["Ocak", "Şubat", "Mart", "Nisan", "Mayıs", "Haziran", "Temmuz", "Ağustos", "Eylül", "Ekim", "Kasım", "Aralık"];

    function verileriGetir(uid) {
        document.getElementById('ay-baslik').innerText = `${ayIsimleri[seciliTarih.getMonth()]} ${seciliTarih.getFullYear()}`;
        onSnapshot(query(collection(db, "islemler"), where("uid", "==", uid)), (snapshot) => {
            let bakiye = 0, gi = 0, veriler = [];
            snapshot.forEach(d => {
                const data = d.data();
                const t = new Date(data.tarih);
                if (t.getMonth() === seciliTarih.getMonth() && t.getFullYear() === seciliTarih.getFullYear()) {
                    veriler.push({ id: d.id, ...data });
                    if(data.tur === 'gelir') bakiye += data.tutar; else { bakiye -= data.tutar; gi += data.tutar; }
                }
            });
            document.getElementById('bakiye').innerText = bakiye.toLocaleString('tr-TR');
            
            let html = "";
            veriler.sort((a, b) => b.tarih - a.tarih).forEach(d => {
                const t = new Date(d.tarih);
                // Tabloda Kategori Bilgisi Gösteriliyor
                html += `<tr><td><strong>${d.aciklama}</strong><br><small>${d.kategori || 'Genel'} • ${d.tur.toUpperCase()}</small></td>
                         <td style="color:${d.tur==='gelir'?'#00ff9d':'#ff4d4d'}; font-weight:bold;">${d.tutar.toLocaleString('tr-TR')} TL</td>
                         <td><button onclick="window.sil('${d.id}')" style="background:none;">❌</button></td></tr>`;
            });
            document.getElementById('tablo').innerHTML = html;
        });
    }

    async function ekle(tur) {
        const aciklama = document.getElementById('aciklama').value;
        const kategori = document.getElementById('kategori').value; // Kategori çekildi
        const tutarVal = document.getElementById('tutar').value.replace(/\./g, '');
        const tutar = parseFloat(tutarVal);
        
        if (!aciklama) return alert("Açıklama girin.");
        if (isNaN(tutar)) return alert("Geçerli bir tutar girin.");

        // Tarih otomatik olarak o anki zaman (now) olarak kaydediliyor
        await addDoc(collection(db, "islemler"), { 
            uid: auth.currentUser.uid, 
            aciklama, 
            tutar, 
            tur, 
            kategori, 
            tarih: Date.now() 
        });
        
        document.getElementById('aciklama').value = ''; 
        document.getElementById('tutar').value = '';
    }

    // ... (Buton click eventleri aynı)
    document.getElementById('btn-gelir').onclick = () => ekle('gelir');
    document.getElementById('btn-gider').onclick = () => ekle('gider');
    window.sil = (id) => deleteDoc(doc(db, "islemler", id));
</script>
</body>
</html>
